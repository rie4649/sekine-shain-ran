<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>関根商店大冒険!社員ラン</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; user-select:none; }
  html,body { width:100%; height:100%; overflow:hidden; background:#222; touch-action:none; }
  #wrap { position:relative; width:100%; height:100%; display:flex; align-items:center; justify-content:center; }
  canvas { background:#87ceeb; max-width:100%; max-height:100%; width:auto; height:auto; display:block; image-rendering:optimizeSpeed; }
  #rotateHint { display:none; }
  @media (orientation: portrait) and (max-width: 900px) {
    #rotateHint { display:flex; position:fixed; top:0; left:0; right:0; z-index:20; background:#ffb300; color:#333; font-family:sans-serif; font-weight:bold; font-size:13px; padding:6px 10px; align-items:center; justify-content:center; text-align:center; }
  }
  #ui { position:absolute; top:8px; left:8px; right:8px; display:flex; justify-content:space-between; font-family:sans-serif; color:#fff; font-weight:bold; text-shadow:1px 1px 2px #000; font-size:16px; pointer-events:none; z-index:5; }
  #hearts span { margin-right:2px; }
  #controls { position:absolute; bottom:16px; left:0; right:0; display:flex; justify-content:space-between; padding:0 16px; z-index:5; }
  .padBtn { width:64px; height:64px; border-radius:50%; background:rgba(255,255,255,0.35); border:2px solid rgba(255,255,255,0.6); font-size:26px; color:#fff; display:flex; align-items:center; justify-content:center; }
  #moveBtns { display:flex; gap:10px; }
  #jumpBtn { width:80px; height:80px; font-size:16px; }
  .padBtn:active, .padBtn.active { background:rgba(255,255,255,0.65); }
  .screen { position:absolute; inset:0; background:rgba(10,14,30,0.88); color:#fff; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; font-family:sans-serif; z-index:10; padding:20px; }
  .screen h1 { font-size:26px; margin-bottom:10px; }
  .screen p { font-size:15px; margin-bottom:6px; line-height:1.6; }
  #startScreen h1 { font-family:'Courier New', monospace; font-size:32px; letter-spacing:4px; font-weight:900; color:#ffd54f; text-shadow:3px 3px 0 #e65100, 0 0 20px rgba(255,213,79,0.5); margin-bottom:6px; }
  #startScreen .subtitle { font-family:'Courier New', monospace; font-size:13px; letter-spacing:2px; color:#ff8a80; margin-bottom:22px; }
  #startScreen .instructions { border:2px solid rgba(255,255,255,0.4); border-radius:8px; padding:10px 16px; margin-bottom:22px; font-family:'Courier New', monospace; font-size:12px; letter-spacing:1px; color:#b3e5fc; line-height:1.8; }
  #startBtn { font-family:'Courier New', monospace; letter-spacing:2px; animation: blinkBtn 1.1s infinite; }
  @keyframes blinkBtn { 0%,49%{opacity:1;} 50%,100%{opacity:0.55;} }
  .btn { margin-top:16px; padding:12px 28px; font-size:17px; font-weight:bold; border:none; border-radius:8px; background:#ffb300; color:#333; }
  #clearScreen h1 { font-size:34px; color:#fff176; text-shadow:0 0 12px #ffd54f, 0 0 30px #ff6f00, 3px 3px 0 #e65100; animation: clearPop 0.6s ease-out, clearGlow 1s ease-in-out infinite alternate; }
  @keyframes clearPop { 0%{ transform:scale(0.2) rotate(-8deg); opacity:0; } 60%{ transform:scale(1.15) rotate(3deg); opacity:1; } 100%{ transform:scale(1) rotate(0); } }
  @keyframes clearGlow { from{ text-shadow:0 0 12px #ffd54f, 0 0 30px #ff6f00, 3px 3px 0 #e65100; } to{ text-shadow:0 0 22px #fff9c4, 0 0 50px #ff9100, 3px 3px 0 #e65100; } }
  #confettiLayer { position:fixed; inset:0; overflow:hidden; pointer-events:none; z-index:15; }
  .confetti-piece { position:absolute; top:-20px; border-radius:2px; animation-name: confettiFall; animation-timing-function: linear; animation-fill-mode: forwards; }
  @keyframes confettiFall {
    0% { transform:translateY(0) rotate(0deg); opacity:1; }
    100% { transform:translateY(110vh) rotate(600deg); opacity:0.9; }
  }
  #flashLayer { position:fixed; inset:0; background:#fff; opacity:0; pointer-events:none; z-index:30; }
  #flashLayer.flash { animation: screenFlash 0.4s ease-out; }
  @keyframes screenFlash { 0%{opacity:0.9;} 100%{opacity:0;} }
  .btn:active { background:#ff9800; }
  .hidden { display:none !important; }
</style>
</head>
<body>
<div id="rotateHint">📱 スマホを横向きにすると画面が大きくなって遊びやすいよ!</div>
<div id="wrap">
  <canvas id="game" width="960" height="950"></canvas>

  <div id="ui">
    <div id="hearts"></div>
    <div id="levelName"></div>
    <div id="score">スコア: 0</div>
  </div>

  <div id="controls">
    <div id="moveBtns">
      <div class="padBtn" id="leftBtn">◀</div>
      <div class="padBtn" id="rightBtn">▶</div>
    </div>
    <div id="actionBtns" style="display:flex; gap:10px;">
      <div class="padBtn" id="fireBtn" style="background:rgba(255,87,34,0.4); border-color:rgba(255,138,101,0.8);">🔥</div>
      <div class="padBtn" id="jumpBtn">ジャンプ</div>
    </div>
  </div>

  <div class="screen" id="startScreen">
    <h1>SEKINE SHOTEN</h1>
    <div class="subtitle">- GREAT ADVENTURE: SHAIN RUN -</div>
    <div class="instructions">
      &larr; &rarr; : MOVE<br>
      JUMP BUTTON / SPACE : JUMP<br>
      COLLECT COINS, REACH THE GOAL!
    </div>
    <button class="btn" id="startBtn">&#9654; PRESS START</button>
  </div>

  <div class="screen hidden" id="clearScreen">
    <h1 id="clearTitle">ステージクリア!</h1>
    <p id="clearScore"></p>
    <button class="btn" id="nextBtn">つぎへ</button>
  </div>

  <div id="flashLayer"></div>
  <div id="confettiLayer"></div>

  <div class="screen hidden" id="overScreen">
    <h1>ゲームオーバー</h1>
    <p id="overScore"></p>
    <button class="btn" id="retryBtn">もういちど</button>
  </div>

  <div class="screen hidden" id="allClearScreen">
    <h1>🎉 全ステージクリア! 🎉</h1>
    <p id="allClearScore"></p>
    <button class="btn" id="restartAllBtn">最初から</button>
  </div>
</div>

  let audioCtx = null;
  function unlockAudio(){
    if(!audioCtx){
      audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    }
    if(audioCtx.state === 'suspended') audioCtx.resume();
  }
  function beep(freq, dur, type, vol){
    if(!audioCtx) return;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type || 'square';
    o.frequency.value = freq;
    g.gain.value = vol!==undefined?vol:0.15;
    o.connect(g); g.connect(audioCtx.destination);
    o.start();
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.stop(audioCtx.currentTime + dur);
  }

  // ---------- 入力 ----------
  function bindHold(el, onDown, onUp){
    let active = false;
    let pid = null;
    const down = e=>{
      if(e && e.preventDefault) e.preventDefault();
      if(active) return;
      active = true;
      pid = (e && e.pointerId!==undefined) ? e.pointerId : null;
      if(pid!==null && el.setPointerCapture){
        try{ el.setPointerCapture(pid); }catch(err){}
      }
      el.classList.add('active');
      onDown();
    };
    const up = e=>{
      if(!active) return;
      if(e && e.pointerId!==undefined && pid!==null && e.pointerId!==pid) return;
      active = false; pid = null;
      el.classList.remove('active');
      onUp();
    };
    el.addEventListener('pointerdown', down);
    el.addEventListener('pointerup', up);
    el.addEventListener('pointercancel', up);
    // フォールバック: ポインターキャプチャ非対応環境向け
    el.addEventListener('touchstart', down, {passive:false});
    el.addEventListener('touchend', up);
    el.addEventListener('touchcancel', up);
    // アプリ切り替えやスクロールで指の状態が失われた時の保険
    window.addEventListener('blur', up);
    document.addEventListener('visibilitychange', ()=>{ if(document.hidden) up(); });
  }
  bindHold(document.getElementById('leftBtn'), ()=>keys.left=true, ()=>keys.left=false);
  bindHold(document.getElementById('rightBtn'), ()=>keys.right=true, ()=>keys.right=false);
  bindHold(document.getElementById('jumpBtn'), ()=>keys.jump=true, ()=>keys.jump=false);

  function shootFireball(){
    if(!level || state!=='playing') return;
    if(!player.powered) return;
    if(player.fireCooldown>0) return;
    player.fireCooldown = 22;
    const fx = player.dir>0 ? player.x+player.w : player.x-16;
    level.fireballs.push({ x:fx, y:player.y+player.h*0.4, vx: player.dir*7, vy:0, w:16, h:16, life:0 });
    sfx.bump();
  }
  const fireBtnEl = document.getElementById('fireBtn');
  fireBtnEl.addEventListener('pointerdown', e=>{ e.preventDefault(); shootFireball(); });
  fireBtnEl.addEventListener('touchstart', e=>{ e.preventDefault(); shootFireball(); }, {passive:false});

  window.addEventListener('keydown', e=>{
    if(e.code==='ArrowLeft') keys.left=true;
    if(e.code==='ArrowRight') keys.right=true;
    if(e.code==='Space'||e.code==='ArrowUp') keys.jump=true;
  });
  window.addEventListener('keyup', e=>{
    if(e.code==='ArrowLeft') keys.left=false;
    if(e.code==='ArrowRight') keys.right=false;
    if(e.code==='Space'||e.code==='ArrowUp') keys.jump=false;
  });

  function startNewGame(){
    levelIndex=0; score=0; lives=3;
    loadLevel(levelIndex);
    updateUI();
    hideAllScreens();
    state='playing';
    startBgm();
  }

  document.getElementById('startBtn').addEventListener('click', ()=>{
    unlockAudio();
    startNewGame();
  });
  document.getElementById('nextBtn').addEventListener('click', ()=>{
    levelIndex++;
    loadLevel(levelIndex);
    hideAllScreens();
    state='playing';
    startBgm();
  });
  document.getElementById('retryBtn').addEventListener('click', ()=>{
    startNewGame();
  });
  document.getElementById('restartAllBtn').addEventListener('click', ()=>{
    startNewGame();
  });

  // ---------- 更新 ----------
  function update(){
    if(state!=='playing') return;

    if(player.invincible>0) player.invincible--;
    if(player.fireCooldown>0) player.fireCooldown--;
    if(player.starTimer>0){
      player.starTimer--;
      if(Math.random()<0.3) spawnSparkles(player.x+player.w/2, player.y+player.h/2);
      if(player.starTimer<=0){ player.starMode=false; player.starImg=null; }
    }

    const curSpeed = player.starMode ? MOVE_SPEED*1.5 : MOVE_SPEED;
    player.vx = 0;
    if(keys.left){ player.vx=-curSpeed; player.dir=-1; }
    if(keys.right){ player.vx=curSpeed; player.dir=1; }

    if(keys.jump && player.onGround){
      player.vy = JUMP_V;
      player.onGround = false;
      sfx.jump();
    }

    const prevY = player.y;
    player.vy += GRAVITY;
    if(player.vy>MAX_FALL) player.vy=MAX_FALL;

    player.x += player.vx;
    if(player.x<0) player.x=0;
    if(player.x> level.width - player.w) player.x = level.width-player.w;
    player.y += player.vy;

    const footX = player.x + player.w/2;
    player.onGround = false;
    if(!isPit(footX)){
      const gY = groundYAt(footX);
      if(player.y + player.h >= gY){
        player.y = gY - player.h;
        player.vy = 0;
        player.onGround = true;
      }
    }

    for(const p of level.platforms){
      if(player.vy>=0 &&
         player.x+player.w>p.x && player.x<p.x+p.w &&
         player.y+player.h>=p.y && player.y+player.h<=p.y+p.h+player.vy+1){
        player.y = p.y - player.h;
        player.vy = 0;
        player.onGround = true;
      }
    }

    // はてなブロック(足場としても乗れる/下から叩くとコイン、叩くと消える)
    for(const b of level.blocks){
      if(b.bump>0) b.bump--;
      if(b.used && !b.removed){
        b.vanish++;
        if(b.vanish>16) b.removed = true;
      }
      if(b.removed) continue;
      // 上に乗る(足場として)
      if(player.vy>=0 &&
         player.x+player.w>b.x && player.x<b.x+b.w &&
         player.y+player.h>=b.y && player.y+player.h<=b.y+b.h+player.vy+1){
        player.y = b.y - player.h;
        player.vy = 0;
        player.onGround = true;
      }
      // 下から叩く
      if(!b.used && player.vy<0 &&
         player.x+player.w>b.x && player.x<b.x+b.w &&
         prevY>=b.y+b.h && player.y<=b.y+b.h){
        b.used = true;
        b.bump = 10;
        player.vy = 1.5;
        level.coins.push({x:b.x+8, y:b.y-26, w:16, h:16, got:false, popped:true, popT:0});
        score += 10;
        sfx.bump();
        updateUI();
      }
    }

    if(player.y > GH + 50){
      sfx.hurt();
      loseLife();
      return;
    }

    if(Math.abs(player.vx)>0 && player.onGround) player.animT += 0.25;

    for(const e of level.enemies){
      if(!e.alive) continue;
      e.x += e.dir*1.1;
      if(e.x > e.baseX + e.range || e.x < e.baseX - e.range) e.dir*=-1;

      if(player.x < e.x+e.w && player.x+player.w > e.x &&
         player.y < e.y+e.h && player.y+player.h > e.y){
        if(player.starMode){
          e.alive=false;
          score += 30;
          sfx.stomp();
          updateUI();
        } else if(player.vy>0 && (player.y+player.h) - e.y < 16){
          e.alive=false;
          player.vy = JUMP_V*0.6;
          score += 50;
          sfx.stomp();
          updateUI();
          if(workerImgs.length>1){
            let next;
            do{ next = workerImgs[Math.floor(Math.random()*workerImgs.length)]; } while(next===player.img);
            player.img = next;
          }
          if(!player.powered){
            player.powered = true;
            const oldH = player.h;
            player.w = Math.round(BASE_PLAYER_W*1.35);
            player.h = Math.round(BASE_PLAYER_H*1.35);
            player.y -= (player.h - oldH);
            sfx.clear();
          }
        } else if(player.invincible<=0){
          if(player.powered){
            sfx.hurt();
            const oldH = player.h;
            player.powered = false;
            player.w = BASE_PLAYER_W;
            player.h = BASE_PLAYER_H;
            player.y += (oldH - player.h);
            player.invincible = 90;
          } else {
            sfx.hurt();
            player.vx = (player.x < e.x)? -4:4;
            player.x += player.vx*3;
            loseLife();
            return;
          }
        }
      }
    }

    // ボス(最終ステージのみ)
    if(level.boss && level.boss.alive){
      const b = level.boss;
      if(b.hurtT>0) b.hurtT--;
      if(player.x < b.x+b.w && player.x+player.w > b.x &&
         player.y < b.y+b.h && player.y+player.h > b.y){
        if(player.starMode){
          b.hp--;
          b.hurtT = 12;
          score += 60;
          sfx.stomp();
          updateUI();
          if(b.hp<=0){
            b.alive = false;
            score += 300;
            updateUI();
            spawnSparkles(b.x+b.w/2, b.y+b.h/2);
            sfx.clear();
          }
        } else if(player.vy>0 && (player.y+player.h) - b.y < 20){
          b.hp--;
          b.hurtT = 12;
          player.vy = JUMP_V*0.7;
          score += 100;
          sfx.stomp();
          updateUI();
          if(b.hp<=0){
            b.alive = false;
            score += 300;
            updateUI();
            spawnSparkles(b.x+b.w/2, b.y+b.h/2);
            sfx.clear();
          }
        } else if(player.invincible<=0){
          if(player.powered){
            sfx.hurt();
            const oldH = player.h;
            player.powered = false;
            player.w = BASE_PLAYER_W;
            player.h = BASE_PLAYER_H;
            player.y += (oldH - player.h);
            player.invincible = 90;
          } else {
            sfx.hurt();
            player.vx = (player.x < b.x)? -4:4;
            player.x += player.vx*3;
            loseLife();
            return;
          }
        }
      }
    }

    // ドラム缶(上に乗れる足場)
    for(const d of level.barrels){
      if(player.vy>=0 &&
         player.x+player.w>d.x && player.x<d.x+d.w &&
         player.y+player.h>=d.y && player.y+player.h<=d.y+d.h+player.vy+1){
        player.y = d.y - player.h;
        player.vy = 0;
        player.onGround = true;
      }
    }

    for(const c of level.coins){
      if(c.got) continue;
      if(c.popped){
        c.popT = (c.popT||0)+1;
        c.y -= 0.6;
        if(c.popT>18){ c.got=true; continue; }
      }
      if(player.x < c.x+c.w && player.x+player.w > c.x &&
         player.y < c.y+c.h && player.y+player.h > c.y){
        c.got = true;
        score += 10;
        sfx.coin();
        updateUI();
        spawnSparkles(c.x+c.w/2, c.y+c.h/2);
      }
    }

    if(level.stars){
      for(const s of level.stars){
        if(s.got) continue;
        s.bob += 0.1;
        if(player.x < s.x+s.w && player.x+player.w > s.x &&
           player.y < s.y+s.h && player.y+player.h > s.y){
          s.got = true;
          player.starMode = true;
          player.starTimer = 480;
          player.starImg = starFormImgs[Math.floor(Math.random()*starFormImgs.length)];
          score += 100;
          sfx.clear();
          updateUI();
          spawnSparkles(s.x+s.w/2, s.y+s.h/2);
        }
      }
    }

    if(level.sparkles && level.sparkles.length){
      for(const s of level.sparkles){
        s.x += s.vx; s.y += s.vy; s.vy += 0.15; s.life++;
      }
      level.sparkles = level.sparkles.filter(s=>s.life<s.maxLife);
    }

    if(level.fireballs && level.fireballs.length){
      for(const f of level.fireballs){
        f.life++;
        f.x += f.vx;
        f.vy += 0.5;
        f.y += f.vy;
        if(f.y+f.h >= GROUND_Y && !isPit(f.x+f.w/2)){
          f.y = GROUND_Y - f.h;
          f.vy = -7;
        }
        for(const e of level.enemies){
          if(!e.alive) continue;
          if(f.x < e.x+e.w && f.x+f.w > e.x && f.y < e.y+e.h && f.y+f.h > e.y){
            e.alive = false;
            f.dead = true;
            score += 50;
            sfx.stomp();
            updateUI();
          }
        }
        if(level.boss && level.boss.alive){
          const b = level.boss;
          if(f.x < b.x+b.w && f.x+f.w > b.x && f.y < b.y+b.h && f.y+f.h > b.y){
            f.dead = true;
            b.hp--;
            b.hurtT = 12;
            score += 80;
            sfx.stomp();
            updateUI();
            if(b.hp<=0){
              b.alive = false;
              score += 300;
              updateUI();
              spawnSparkles(b.x+b.w/2, b.y+b.h/2);
              sfx.clear();
            }
          }
        }
      }
      level.fireballs = level.fireballs.filter(f=>!f.dead && f.life<150 && f.x>cameraX-50 && f.x<cameraX+VW+50);
    }

    if(player.x + player.w >= level.flagX){
      state='clear';
      sfx.clear();
      flashScreen();
      document.getElementById('clearScore').textContent = 'スコア: '+score;
      if(levelIndex >= LEVELS.length-1){
        document.getElementById('allClearScore').textContent = '最終スコア: '+score;
        showScreen('allClearScreen');
        spawnConfetti();
      } else {
        document.getElementById('clearTitle').textContent = level.name + ' クリア!';
        showScreen('clearScreen');
        spawnConfetti();
      }
    }

    cameraX = Math.max(0, Math.min(player.x - VW/2, level.width - VW));
  }

  // ---------- 描画 ----------
  function drawPlayer(){
    ctx.save();
    ctx.translate(player.x - cameraX, player.y);
    if(player.invincible>0 && Math.floor(player.invincible/6)%2===0) ctx.globalAlpha=0.4;
    const bob = player.onGround ? Math.abs(Math.sin(player.animT))*2 : 0;
    const usingStarForm = player.starMode && player.starImg;
    const img = usingStarForm ? player.starImg : player.img;
    const dw = player.w*1.5, dh = player.h*1.436;
    if(player.starMode){
      const hue = Math.floor(player.starTimer/4)%6;
      const colors = ['#ff5252','#ffab40','#ffee58','#69f0ae','#40c4ff','#e040fb'];
      ctx.shadowColor = colors[hue];
      ctx.shadowBlur = 18;
    }
    if(img && img.complete && img.naturalWidth>0){
      if(player.dir<0){
        ctx.translate(player.w/2, 0);
        ctx.scale(-1,1);
        ctx.drawImage(img, -dw/2, player.h-dh-bob, dw, dh);
      } else {
        ctx.drawImage(img, player.w/2-dw/2, player.h-dh-bob, dw, dh);
      }
    } else {
      // 画像が読み込めない場合の保険(必ず何か見える状態にする)
      ctx.fillStyle = '#1e88e5';
      ctx.fillRect(0, -bob, player.w, player.h);
      ctx.fillStyle = '#ffcc99';
      ctx.beginPath(); ctx.arc(player.w/2, -bob-6, 9, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }

  function drawEnemy(e){
    if(!e.alive) return;
    ctx.save();
    ctx.translate(e.x-cameraX, e.y-8);
    if(crabImg.complete && crabImg.naturalWidth>0){
      if(e.dir<0){
        ctx.translate(e.w/2,0); ctx.scale(-1,1);
        ctx.drawImage(crabImg, -e.w/2-4, 0, e.w+8, e.h+10);
      } else {
        ctx.drawImage(crabImg, -4, 0, e.w+8, e.h+10);
      }
    }
    ctx.restore();
  }

  function drawBoss(){
    if(!level.boss || !level.boss.alive) return;
    const b = level.boss;
    ctx.save();
    const shake = b.hurtT>0 ? (Math.random()*6-3) : 0;
    ctx.translate(b.x-cameraX+shake, b.y);
    if(b.hurtT>0 && Math.floor(b.hurtT/3)%2===0) ctx.globalAlpha = 0.5;
    if(bossImg.complete && bossImg.naturalWidth>0){
      ctx.drawImage(bossImg, 0, 0, b.w, b.h);
    }
    ctx.restore();
    // HPバー
    ctx.save();
    const barW = b.w, barX = b.x-cameraX, barY = b.y-18;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(barX, barY, barW, 10);
    ctx.fillStyle = '#e53935';
    ctx.fillRect(barX+2, barY+2, (barW-4)*Math.max(0,b.hp/b.maxHp), 6);
    ctx.restore();
  }

  function drawCoin(c){
    if(c.got) return;
    ctx.save();
    ctx.globalAlpha = c.popped ? Math.max(0,1-(c.popT||0)/18) : 1;
    if(coinImg.complete && coinImg.naturalWidth>0){
      ctx.drawImage(coinImg, c.x-cameraX, c.y, c.w, c.h);
    }
    ctx.restore();
  }

  function drawStars(){
    if(!level.stars) return;
    for(const s of level.stars){
      if(s.got) continue;
      const bobY = Math.sin(s.bob||0)*6;
      ctx.save();
      if(starImg.complete && starImg.naturalWidth>0){
        ctx.drawImage(starImg, s.x-cameraX, s.y+bobY, s.w, s.h);
      }
      ctx.restore();
    }
  }

  function drawFireballs(){
    if(!level.fireballs) return;
    for(const f of level.fireballs){
      ctx.save();
      const cx = f.x-cameraX+f.w/2, cy = f.y+f.h/2;
      ctx.fillStyle = '#ff5722';
      ctx.beginPath(); ctx.arc(cx, cy, f.w/2, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ffca28';
      ctx.beginPath(); ctx.arc(cx, cy, f.w/2*0.55, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }
  }

  function drawSparkles(){
    if(!level.sparkles) return;
    for(const s of level.sparkles){
      const t = s.life / s.maxLife;
      const alpha = Math.max(0, 1 - t);
      const size = 5 + (1-t)*4;
      const sx = s.x - cameraX, sy = s.y;
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = '#fff59d';
      ctx.strokeStyle = '#fff9c4';
      ctx.translate(sx, sy);
      ctx.rotate(t*Math.PI);
      ctx.beginPath();
      ctx.moveTo(0,-size); ctx.lineTo(size*0.28,-size*0.28);
      ctx.lineTo(size,0); ctx.lineTo(size*0.28,size*0.28);
      ctx.lineTo(0,size); ctx.lineTo(-size*0.28,size*0.28);
      ctx.lineTo(-size,0); ctx.lineTo(-size*0.28,-size*0.28);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }
  }

  function drawBlock(b){
    if(b.removed) return;
    ctx.save();
    const bx = b.x-cameraX, by = b.y-(b.bump>0?4:0);
    if(blockImg.complete && blockImg.naturalWidth>0){
      if(b.used){
        const t = Math.min(1, b.vanish/16);
        ctx.globalAlpha = 1-t;
        const scale = 1-t*0.5;
        const cx = bx+b.w/2, cy = by+b.h/2;
        ctx.translate(cx,cy);
        ctx.scale(scale,scale);
        ctx.drawImage(blockImg, -b.w/2, -b.h/2, b.w, b.h);
      } else {
        ctx.drawImage(blockImg, bx, by, b.w, b.h);
      }
    }
    ctx.restore();
  }

  function drawBarrel(d){
    ctx.save();
    if(barrelImg.complete && barrelImg.naturalWidth>0){
      ctx.drawImage(barrelImg, d.x-cameraX, d.y, d.w, d.h);
    }
    ctx.restore();
  }

  function drawBrickPlatform(p){
    ctx.save();
    if(brickImg.complete && brickImg.naturalWidth>0){
      const tile = p.h;
      const sx = p.x - cameraX;
      let x = sx;
      const endX = sx + p.w;
      while(x < endX){
        const w = Math.min(tile, endX - x);
        ctx.drawImage(brickImg, x, p.y, w, tile);
        x += tile;
      }
    } else {
      ctx.fillStyle='#a1887f';
      ctx.fillRect(p.x-cameraX, p.y, p.w, p.h);
    }
    ctx.restore();
  }

  const SKY_TILES = [
    {img: skyImg, w: SKY_TILE_W, h: SKY_TILE_H},   // [0]=地上
    {img: skyImg2, w: SKY_TILE_W, h: SKY_TILE_H},  // [1]=地下
    {img: skyImg3, w: 1363, h: 454}                 // [2]=夜の高速道路
  ];
  function currentSkyTile(){
    if(level && level.bgIndex!==undefined && SKY_TILES[level.bgIndex]) return SKY_TILES[level.bgIndex];
    return SKY_TILES[0];
  }
  function drawSky(){
    ctx.fillStyle = (level && level.bgFallback) ? level.bgFallback : '#87ceeb';
    ctx.fillRect(-50, CAM_Y-100, VW+300, VH+300);
    const tile = currentSkyTile();
    const img = tile.img;
    if(!img.complete || img.naturalWidth===0) return;
    const tw = tile.w, th = tile.h;
    const parallax = cameraX*0.4;
    let startX = -(parallax % tw);
    if(startX>0) startX -= tw;
    for(let x=startX; x<VW; x+=tw){
      ctx.drawImage(img, x, 0, tw, th);
    }
  }

  function drawBuildingAt(worldX){
    const sx = worldX - cameraX;
    if(sx+BUILD_W<0 || sx>VW) return;
    if(buildingImg.complete && buildingImg.naturalWidth>0){
      ctx.drawImage(buildingImg, sx, GROUND_Y-BUILD_H, BUILD_W, BUILD_H);
    }
  }

  function draw(){
    ctx.setTransform(1,0,0,1,0,0);
    ctx.clearRect(0,0,GW,GH);
    ctx.save();
    ctx.scale(ZOOM,ZOOM);
    ctx.translate(0,-CAM_Y);
    drawSky();

    // 地面(通行可能な部分) - ピットと地下エリアの入口は地面を途切れさせる
    ctx.fillStyle = level.groundColor || '#8d6e63';
    const gaps = level.pits.map(p=>[p[0],p[1]])
      .concat((level.underground||[]).map(u=>[u.start,u.end]))
      .sort((a,b)=>a[0]-b[0]);
    let segStart = 0;
    for(const g of gaps){
      ctx.fillRect(segStart-cameraX, GROUND_Y, (g[0]-segStart), GH-GROUND_Y);
      segStart = g[1];
    }
    ctx.fillRect(segStart-cameraX, GROUND_Y, (level.width-segStart), GH-GROUND_Y);

    // 穴(ピット、底なし)
    ctx.fillStyle = '#1a1a1a';
    for(const p of level.pits){
      ctx.fillRect(p[0]-cameraX, GROUND_Y, p[1]-p[0], GH-GROUND_Y);
    }

    // 地下エリア(コインが取れるくぼみ)
    if(level.underground){
      for(const u of level.underground){
        const floorY = GROUND_Y + u.depth;
        ctx.fillStyle = '#5d4037';
        ctx.fillRect(u.start-cameraX, floorY, (u.end-u.start), GH-floorY);
        ctx.fillStyle = '#3e2723';
        ctx.fillRect(u.start-cameraX, GROUND_Y, 10, u.depth);
        ctx.fillRect(u.end-10-cameraX, GROUND_Y, 10, u.depth);
      }
    }

    for(const p of level.platforms){
      drawBrickPlatform(p);
    }

    level.blocks.forEach(drawBlock);
    level.barrels.forEach(drawBarrel);

    level.coins.forEach(drawCoin);
    drawStars();
    level.enemies.forEach(drawEnemy);
    drawBoss();
    drawFireballs();
    drawPlayer();
    drawSparkles();
    ctx.restore();
  }

  function loop(){
    update();
    if(level) draw();
    requestAnimationFrame(loop);
  }

  updateUI();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
